name: Daily Python Scripts

on:
  schedule:
    - cron: "0 6 * * *"   # Runs daily at 6:00 AM UTC — adjust as needed
  workflow_dispatch:        # Allows manual trigger from GitHub UI

permissions:
  contents: write           # Needed to commit output files back to repo

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 60       # two breadth downloads (~500 S&P + ~220 TSX tickers)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scripts
        timeout-minutes: 55   # fail loudly before the job-level timeout swallows the error
        run: |
          python scripts/generate_charts.py
          python scripts/generate_charts_tsx.py

      - name: Commit outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git diff --cached --quiet || git commit -m "chore: update outputs [skip ci]"
          git push
